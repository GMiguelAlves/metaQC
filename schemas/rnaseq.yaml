schema_name: rnaseq

required_columns:
  - sample_id

optional_columns:
  - study
  - stage
  - sex
  - tissue
  - condition
  - batch
  - replicate
  - platform
  - layout
  - strandedness
  - source
  - curation_notes

aliases:
  sample_id:
    - sample
    - sampleid
    - sample_name
    - sample_name_id
    - sample name
    - run_accession
    - run
    - accession

  condition:
    - group
    - treatment
    - experimental_group
    - phenotype
    - condition_name

  study:
    - study
    - project
    - bioproject
    - study_id

  sex:
    - sex
    - gender

  stage:
    - location
    - lifecycle_stage
    - developmental_stage
    - life_stage

  batch:
    - batch
    - lane
    - sequencing_batch

  replicate:
    - replicate
    - rep
    - biological_replicate
    - bio_rep

  platform:
    - platform
    - sequencing_platform
    - instrument

  layout:
    - layout
    - library_layout
    - paired_end

  strandedness:
    - strandedness
    - library_strand
    - strand

  source:
    - source
    - origin
    - dataset_source

  curation_notes:
    - curation_notes
    - notes
    - comments

normalization:
  sex:
    M: male
    Male: male
    male: male
    m: male

    F: female
    Female: female
    female: female
    f: female

  layout:
    paired: paired
    PE: paired
    paired-end: paired
    paired_end: paired

    single: single
    SE: single
    single-end: single
    single_end: single

  strandedness:
    yes: stranded
    no: unstranded
    forward: stranded
    reverse: reverse
